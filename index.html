   <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍藏大師：CORE DB 雲端版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'ui-sans-serif', system-ui, -apple-system, sans-serif;
            background-color: #0a0c10;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .grid-pattern {
            background-image: radial-gradient(#161b22 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f1218;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #1f6feb;
        }

        .neon-glow {
            box-shadow: 0 0 15px rgba(31, 111, 235, 0.4);
        }

        .upload-overlay {
            display: none;
        }

        .upload-overlay.active {
            display: flex;
        }
    </style>
</head>
<body class="text-[#c9d1d9] grid-pattern h-screen overflow-hidden">

    <div class="flex h-full w-full">
        <!-- 側邊欄 Sidebar -->
        <aside class="w-72 flex-shrink-0 flex flex-col border-r-2 border-[#30363d] bg-[#0f1218] backdrop-blur-md">
            <div class="p-8 flex items-center gap-4">
                <div class="p-2.5 rounded-lg border-2 border-blue-400/50 bg-[#1f6feb] text-white neon-glow">
                    <i data-lucide="cpu" class="w-6 h-6 animate-pulse"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-widest text-white uppercase">CORE DB</h1>
                    <p class="text-[10px] text-blue-400 font-mono italic underline">EVOLYS_SYSTEM_HTML</p>
                </div>
            </div>

            <nav class="flex-1 px-4 space-y-1.5 mt-4">
                <button onclick="showDashboard()" id="nav-dashboard" class="w-full flex items-center gap-4 px-5 py-3 rounded-lg border-l-4 border-blue-500 bg-blue-500/10 text-white font-bold transition-all">
                    <i data-lucide="monitor" class="w-[18px] h-[18px]"></i>
                    <span class="text-sm uppercase tracking-widest">中央控制台</span>
                </button>
            </nav>

            <div class="p-6 border-t-2 border-[#30363d] mt-auto space-y-4">
                <!-- 登入後區塊 -->
                <div id="user-profile" class="hidden space-y-4">
                    <div class="flex items-center gap-3 p-2 bg-blue-500/10 rounded-lg border border-blue-500/30">
                        <img id="user-avatar" src="" class="w-8 h-8 rounded border border-blue-400" alt="avatar">
                        <div class="overflow-hidden">
                            <p id="user-name" class="text-[10px] font-bold text-blue-400 truncate">收藏家</p>
                            <p id="user-id" class="text-[8px] text-slate-500 font-mono truncate">UID</p>
                        </div>
                        <button onclick="handleLogout()" class="ml-auto p-1 text-slate-400 hover:text-white">
                            <i data-lucide="log-out" class="w-[14px] h-[14px]"></i>
                        </button>
                    </div>
                    <div class="p-4 rounded-xl bg-[#161b22] border-2 border-[#30363d]">
                        <div class="flex items-center gap-3 mb-2 text-[10px] font-bold text-blue-400 uppercase tracking-widest">
                            <i data-lucide="cloud" class="w-[14px] h-[14px]"></i> CLOUD SYNC ACTIVE
                        </div>
                        <div class="w-full h-1 bg-blue-900 rounded-full overflow-hidden">
                            <div class="w-full h-full bg-blue-500 animate-pulse shadow-[0_0_8px_#3b82f6]"></div>
                        </div>
                    </div>
                </div>
                <!-- 登入前按鈕 -->
                <button id="login-btn" onclick="handleGoogleLogin()" class="w-full py-3 flex items-center justify-center gap-2 rounded-lg bg-white text-black font-bold uppercase tracking-widest text-xs hover:bg-blue-400 transition-all">
                    <i data-lucide="log-in" class="w-[14px] h-[14px]"></i> GOOGLE 授權登入
                </button>
            </div>
        </aside>

        <!-- 主內容區 Main -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 flex items-center justify-between px-10 border-b-2 border-[#30363d] bg-[#0f1218]">
                <div class="relative w-[450px]">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-blue-400 w-[18px] h-[18px]"></i>
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="搜尋雲端資料庫中的物件..."
                        class="w-full pl-12 pr-4 py-2.5 rounded-lg bg-black/40 border-2 border-[#30363d] outline-none focus:border-blue-500 font-mono text-sm text-white transition-all"
                        oninput="handleSearch(this.value)"
                    >
                </div>
                <div class="flex items-center gap-6">
                    <div class="px-4 py-2 bg-blue-500/10 border border-blue-500/30 rounded text-blue-400 font-mono text-xs">
                        NET WORTH: <span id="net-worth">$0</span>
                    </div>
                </div>
            </header>

            <div id="content-area" class="flex-1 overflow-y-auto p-10 custom-scrollbar">
                <!-- 內容會由 JS 動態生成 -->
            </div>
        </main>
    </div>

    <!-- 上傳遮罩 Overlay -->
    <div id="upload-overlay" class="upload-overlay fixed inset-0 bg-black/90 backdrop-blur-md flex-col items-center justify-center z-50">
        <i data-lucide="zap" class="w-16 h-16 text-blue-500 animate-bounce mb-6"></i>
        <p class="text-blue-400 font-mono animate-pulse tracking-[0.5em] text-lg uppercase">Uploading_to_Cloud</p>
    </div>

    <script>
        // --- 初始化 Firebase ---
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'collector-master-evolys';

        let currentUser = null;
        let allItems = [];
        let currentView = 'dashboard';
        let activeCategory = null;

        const DEFAULT_CATEGORIES = [
            { id: 'cat1', name: '復古機械錶', type: '精密儀器', color: 'bg-cyan-500', icon: '⌚' },
            { id: 'cat2', name: '黑膠唱片', type: '音訊媒體', color: 'bg-indigo-500', icon: '📻' },
            { id: 'cat3', name: '稀有球鞋', type: '穿戴裝置', color: 'bg-amber-500', icon: '👟' },
            { id: 'cat4', name: '遊戲機光碟', type: '數位軟體', color: 'bg-emerald-500', icon: '💿' },
            { id: 'cat5', name: '世界名著', type: '紙本檔案', color: 'bg-rose-500', icon: '📖' },
        ];

        // --- 核心邏輯 ---

        // 監聽登入狀態
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                // 規則 3: 若無 Token 則匿名登入以確保權限
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
            }
            currentUser = auth.currentUser;
            updateUIForAuth();
            if (currentUser) listenToItems();
        });

        function updateUIForAuth() {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            
            if (currentUser && !currentUser.isAnonymous) {
                loginBtn.classList.add('hidden');
                userProfile.classList.remove('hidden');
                document.getElementById('user-name').innerText = currentUser.displayName || '收藏家';
                document.getElementById('user-id').innerText = currentUser.uid;
                document.getElementById('user-avatar').src = currentUser.photoURL || `https://api.dicebear.com/7.x/identicon/svg?seed=${currentUser.uid}`;
            } else {
                loginBtn.classList.remove('hidden');
                userProfile.classList.add('hidden');
            }
            lucide.createIcons();
        }

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (err) {
                console.error("Login failed", err);
            }
        }

        function handleLogout() {
            auth.signOut();
        }

        // 監聽 Firestore (規則 1 & 2)
        let itemsUnsubscribe = null;
        function listenToItems() {
            if (itemsUnsubscribe) itemsUnsubscribe();
            
            const path = `artifacts/${appId}/users/${currentUser.uid}/items`;
            itemsUnsubscribe = db.collection(path).onSnapshot((snapshot) => {
                allItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderContent();
                updateStats();
            }, (err) => console.error("Firestore Error", err));
        }

        function updateStats() {
            const totalValue = allItems.reduce((acc, curr) => acc + (Number(curr.price) || 0), 0);
            document.getElementById('net-worth').innerText = `$${totalValue.toLocaleString()}`;
        }

        // --- 渲染函數 ---

        function renderContent() {
            const container = document.getElementById('content-area');
            if (currentView === 'dashboard') {
                renderDashboard(container);
            } else {
                renderList(container);
            }
            lucide.createIcons();
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="space-y-10">
                    <div class="flex justify-between items-end">
                        <div>
                            <h2 class="text-4xl font-black tracking-tight text-white uppercase italic">檔案磁區</h2>
                            <p class="text-sm text-slate-500 font-mono mt-2">已連結資料庫: ${appId}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
                        ${DEFAULT_CATEGORIES.map(cat => `
                            <button onclick="showList('${cat.id}')" class="group text-left rounded-xl overflow-hidden border-2 border-[#30363d] bg-[#161b22] transition-all hover:border-blue-500 hover:shadow-[0_0_20px_rgba(59,130,246,0.1)]">
                                <div class="h-1.5 ${cat.color}"></div>
                                <div class="p-6">
                                    <span class="text-3xl mb-4 block group-hover:scale-110 transition-transform">${cat.icon}</span>
                                    <h3 class="font-black text-sm uppercase tracking-wider text-white">${cat.name}</h3>
                                    <p class="text-[10px] font-mono text-slate-500">${cat.type}</p>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderList(container) {
            const filteredItems = allItems.filter(i => i.catId === activeCategory.id);
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            const displayItems = filteredItems.filter(i => i.name.toLowerCase().includes(searchVal));

            container.innerHTML = `
                <div class="space-y-8">
                    <div class="flex items-center justify-between">
                        <button onclick="showDashboard()" class="flex items-center gap-2 text-slate-500 hover:text-blue-400 transition-all font-bold uppercase text-xs tracking-widest">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i> 返回控制中心
                        </button>
                        <div class="flex gap-4">
                            <label class="cursor-pointer flex items-center gap-2 px-6 py-3 rounded-lg bg-emerald-600 text-white font-bold uppercase tracking-widest text-xs hover:bg-emerald-500 transition-all shadow-lg shadow-emerald-900/20">
                                <i data-lucide="camera" class="w-4 h-4"></i> 上傳物件照片 (BASE64)
                                <input type="file" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
                            </label>
                            <button onclick="addItem(null)" class="flex items-center gap-2 px-6 py-3 rounded-lg bg-[#1f6feb] text-white font-bold uppercase tracking-widest text-xs shadow-[0_0_15px_rgba(31,111,235,0.4)]">
                                <i data-lucide="plus" class="w-4 h-4"></i> 新增文字記錄
                            </button>
                        </div>
                    </div>

                    <div class="border-l-4 border-blue-500 pl-6">
                        <h2 class="text-3xl font-black text-white italic uppercase tracking-tighter">
                            ${activeCategory.name} <span class="text-slate-600 text-xl font-light font-mono ml-2">// ${displayItems.length} ENTRIES</span>
                        </h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
                        ${displayItems.map(item => `
                            <div class="group rounded-2xl overflow-hidden border-2 border-[#30363d] bg-[#161b22] transition-all hover:border-blue-500">
                                <div class="aspect-square bg-black/50 flex items-center justify-center overflow-hidden border-b border-[#30363d]">
                                    ${item.img ? `<img src="${item.img}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-all">` : `<i data-lucide="disc" class="w-12 h-12 text-slate-800 animate-pulse"></i>`}
                                </div>
                                <div class="p-6">
                                    <div class="flex justify-between items-start mb-3">
                                        <h4 class="font-black text-sm text-white truncate pr-2 uppercase">${item.name}</h4>
                                        <span class="text-blue-400 font-mono text-xs tracking-tighter">$${(item.price || 0).toLocaleString()}</span>
                                    </div>
                                    <div class="flex items-center gap-2 font-mono text-[10px] text-slate-500">
                                        <i data-lucide="calendar" class="w-3 h-3"></i> ${item.date}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- 操作函數 ---

        function showDashboard() {
            currentView = 'dashboard';
            activeCategory = null;
            document.getElementById('nav-dashboard').classList.add('bg-blue-500/10', 'border-blue-500', 'text-white');
            renderContent();
        }

        function showList(catId) {
            currentView = 'list';
            activeCategory = DEFAULT_CATEGORIES.find(c => c.id === catId);
            document.getElementById('nav-dashboard').classList.remove('bg-blue-500/10', 'border-blue-500', 'text-white');
            renderContent();
        }

        function handleSearch() {
            renderContent();
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onloadend = () => addItem(reader.result);
            reader.readAsDataURL(file);
        }

        async function addItem(imageBase64) {
            if (!currentUser || !activeCategory) return;
            const overlay = document.getElementById('upload-overlay');
            overlay.classList.add('active');

            try {
                const path = `artifacts/${appId}/users/${currentUser.uid}/items`;
                await db.collection(path).add({
                    catId: activeCategory.id,
                    name: document.getElementById('search-input').value || `新收藏 #${allItems.length + 1}`,
                    date: new Date().toISOString().split('T')[0],
                    price: Math.floor(Math.random() * 10000),
                    condition: '全新',
                    img: imageBase64,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('search-input').value = '';
            } catch (err) {
                console.error("Upload failed", err);
            } finally {
                overlay.classList.remove('active');
            }
        }

        // 初始化
        window.onload = () => {
            renderContent();
            lucide.createIcons();
        };
    </script>
</body>
</html>
